# SERVIDOR
spring.application.name=inventario
server.port=8087

# EUREKA (Docker)
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# BASE DE DATOS (Docker ? MySQL en Windows)
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/db_inventario?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes
