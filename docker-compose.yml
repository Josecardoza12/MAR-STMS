services:

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      SPRING_APPLICATION_NAME: eureka-server
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    networks:
      - marstms-network

  auth:
    build: ./auth
    container_name: auth
    ports:
      - "9090:9090"
    environment:
      SERVER_PORT: 9090
      SPRING_APPLICATION_NAME: AUTH
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/db_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_FLYWAY_CONNECT_RETRIES: 20
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - marstms-network

  cliente:
    build: ./cliente
    container_name: cliente
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: CLIENTE
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/db_cliente?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_FLYWAY_CONNECT_RETRIES: 20
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      auth:
        condition: service_started
    networks:
      - marstms-network

  equipo:
    build: ./equipo
    container_name: equipo
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_APPLICATION_NAME: EQUIPO
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/db_equipo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_FLYWAY_CONNECT_RETRIES: 20
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      cliente:
        condition: service_started
    networks:
      - marstms-network

  orden_trabajo:
