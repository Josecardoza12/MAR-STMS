      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      auth:
        condition: service_started
      cliente:
        condition: service_started
      equipo:
        condition: service_started
      orden_trabajo:
        condition: service_started
      diagnostico:
        condition: service_started
      reparacion:
        condition: service_started
      inventario:
        condition: service_started
      bodega:
        condition: service_started
      pago:
        condition: service_started
      finanzas:
