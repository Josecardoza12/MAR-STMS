      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_FLYWAY_CONNECT_RETRIES: 20
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      cliente:
        condition: service_started
      equipo:
        condition: service_started
    networks:
      - marstms-network

  diagnostico:
